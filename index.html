<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timers LOOP</title>
    <!-- We use Tailwind CSS via CDN for rapid, clean, and responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animation for the ringing state to alert the user */
        @keyframes pulse-alarm {
            0%, 100% { background-color: #ef4444; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { background-color: #f87171; box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
        }
        .btn-ringing {
            animation: pulse-alarm 1.5s infinite;
        }
        
        /* Smooth transitions for UI elements */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- App Header -->
    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Timers LOOP
            </h1>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        
        <!-- ========================================== -->
        <!-- VIEW 1: DASHBOARD (Builder / Management)   -->
        <!-- ========================================== -->
        <div id="dashboard-view" class="fade-in grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Column 1: Manage Timers -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-full">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-700">Mes Minuteurs</h2>
                    <button onclick="App.openTimerModal()" class="bg-emerald-50 text-emerald-600 hover:bg-emerald-100 px-4 py-2 rounded-lg font-semibold transition-colors text-sm">
                        + Créer
                    </button>
                </div>
                <!-- List container for timers -->
                <div id="timers-list" class="flex-1 overflow-y-auto space-y-3">
                    <!-- Timers will be injected here by JavaScript -->
                </div>
            </section>

            <!-- Column 2: Manage Loops -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-full">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-700">Mes Boucles</h2>
                    <button onclick="App.createNewLoop()" class="bg-blue-50 text-blue-600 hover:bg-blue-100 px-4 py-2 rounded-lg font-semibold transition-colors text-sm">
                        + Nouvelle
                    </button>
                </div>
                <!-- List container for loops -->
                <div id="loops-list" class="flex-1 overflow-y-auto space-y-4">
                    <!-- Loops will be injected here by JavaScript -->
                </div>
            </section>

        </div>

        <!-- ========================================== -->
        <!-- VIEW 2: RUNNER (Active Loop Execution)     -->
        <!-- ========================================== -->
        <div id="runner-view" class="hidden fade-in max-w-2xl mx-auto">
            
            <!-- Navigation back to dashboard -->
            <button onclick="App.exitRunner()" class="mb-6 text-slate-500 hover:text-slate-800 flex items-center gap-2 font-medium transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Retour
            </button>

            <!-- Main Runner Card -->
            <div class="bg-white p-6 md:p-12 rounded-3xl shadow-lg border border-slate-100 text-center relative overflow-hidden">
                <h2 id="runner-loop-name" class="text-2xl font-bold text-slate-600 mb-2">Nom de la boucle</h2>
                <h3 id="runner-timer-name" class="text-lg text-slate-400 mb-8 font-medium">Timer actuel</h3>
                
                <!-- Huge Time Display -->
                <!-- Removed overflow-hidden, adjusted text responsiveness and added whitespace-nowrap to prevent line breaks -->
                <div class="w-full mb-10 md:mb-12 flex justify-center">
                    <div id="runner-time-display" class="text-5xl sm:text-6xl md:text-8xl font-black text-slate-800 font-mono tabular-nums whitespace-nowrap">
                        00:00:00
                    </div>
                </div>

                <!-- Controls: Start & Stop -->
                <div class="flex justify-center gap-4 md:gap-6">
                    <button id="btn-start" onclick="App.handleRunnerStart()" class="w-28 md:w-32 py-4 rounded-xl font-bold text-lg text-white bg-emerald-500 hover:bg-emerald-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all transform active:scale-95 shadow-md">
                        Start
                    </button>
                    <button id="btn-stop" onclick="App.handleRunnerStop()" class="w-28 md:w-32 py-4 rounded-xl font-bold text-lg text-white bg-rose-500 hover:bg-rose-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all transform active:scale-95 shadow-md">
                        Stop
                    </button>
                </div>
            </div>

            <!-- Sequence visualizer (Upcoming timers) -->
            <div id="runner-sequence-container" class="mt-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h4 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Séquence</h4>
                <ul id="runner-sequence-list" class="space-y-2">
                    <!-- Sequence items injected by JS -->
                </ul>
            </div>

        </div>
    </main>

    <!-- ========================================== -->
    <!-- MODAL: Create / Edit Timer                 -->
    <!-- ========================================== -->
    <div id="timer-modal" class="fixed inset-0 bg-slate-900 bg-opacity-50 flex items-center justify-center hidden z-40 p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl fade-in">
            <h2 id="timer-modal-title" class="text-xl font-bold mb-4 text-slate-800">Nouveau Minuteur</h2>
            
            <form id="timer-form" onsubmit="App.saveTimer(event)">
                <input type="hidden" id="timer-id">
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-600 mb-1">Nom (Optionnel)</label>
                    <input type="text" id="timer-name" placeholder="Ex: Étirement" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                </div>

                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Heures</label>
                        <input type="number" id="timer-h" min="0" max="99" value="0" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none text-center">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Minutes</label>
                        <input type="number" id="timer-m" min="0" max="59" value="0" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none text-center">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Secondes</label>
                        <input type="number" id="timer-s" min="0" max="59" value="0" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none text-center">
                    </div>
                </div>

                <div class="flex justify-end gap-3">
                    <button type="button" onclick="App.closeTimerModal()" class="px-4 py-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition-colors">Annuler</button>
                    <button type="submit" class="px-4 py-2 text-white bg-emerald-500 hover:bg-emerald-600 rounded-lg font-medium transition-colors">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- CUSTOM DIALOG MODAL (Alert/Confirm/Prompt) -->
    <!-- ========================================== -->
    <div id="dialog-modal" class="fixed inset-0 bg-slate-900 bg-opacity-60 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl fade-in text-center">
            <h3 id="dialog-title" class="text-xl font-bold mb-2 text-slate-800">Titre</h3>
            <p id="dialog-message" class="text-slate-600 mb-5 text-sm">Message</p>
            
            <input type="text" id="dialog-input" class="w-full px-4 py-2 border border-slate-300 rounded-lg mb-5 hidden focus:ring-2 focus:ring-emerald-500 focus:outline-none text-center">
            
            <div class="flex justify-center gap-3">
                <button id="dialog-btn-cancel" class="px-4 py-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition-colors hidden">
                    Annuler
                </button>
                <button id="dialog-btn-confirm" class="px-4 py-2 text-white bg-emerald-500 hover:bg-emerald-600 rounded-lg font-medium transition-colors">
                    OK
                </button>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script src="js/store.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/dialog.js"></script>
    <script src="js/runner.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>  
</body>
</html>
